<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F0A00" />
  <title>Admin Login — SK EGG MART</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body style="font-family:'Outfit',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0F0A00 0%,#1A1200 50%,#2D1F00 100%);display:flex;align-items:center;justify-content:center;padding:20px;">

  <!-- Background Orbs -->
  <div style="position:fixed;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(245,158,11,0.12),transparent);border-radius:50%;pointer-events:none;"></div>
  <div style="position:fixed;bottom:-100px;left:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(234,88,12,0.08),transparent);border-radius:50%;pointer-events:none;"></div>

  <div style="width:100%;max-width:420px;">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:32px;" id="logo-section">
      <div style="width:80px;height:80px;background:linear-gradient(135deg,#F59E0B,#EA580C);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 20px 40px rgba(245,158,11,0.3);">
        <span style="font-size:2.2rem;">🥚</span>
      </div>
      <h1 style="color:white;font-size:1.8rem;font-weight:900;margin-bottom:4px;">SK EGG MART</h1>
      <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;">Admin Portal</p>
    </div>

    <!-- Login Card -->
    <div id="login-card" style="background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid rgba(245,158,11,0.2);border-radius:20px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,0.4);">

      <h2 style="color:white;font-size:1.2rem;font-weight:700;margin-bottom:6px;">Welcome Back</h2>
      <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;margin-bottom:24px;">Sign in to manage orders</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
          <div style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px 16px;margin-bottom:16px;color:#FCA5A5;font-size:0.88rem;display:flex;align-items:center;gap:8px;">
            <span>❌</span> {{ msg }}
          </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="/admin/login" id="login-form">
        <!-- Username -->
        <div style="margin-bottom:16px;">
          <label style="display:block;color:rgba(255,255,255,0.7);font-size:0.88rem;font-weight:600;margin-bottom:8px;">Username</label>
          <div style="position:relative;">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.4);font-size:1.1rem;">👤</span>
            <input type="text" name="username" id="username" required
              placeholder="Enter username"
              autocomplete="username"
              style="width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(245,158,11,0.2);border-radius:10px;padding:13px 14px 13px 42px;color:white;font-family:'Outfit',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.3s;"
              onfocus="this.style.borderColor='rgba(245,158,11,0.6)'"
              onblur="this.style.borderColor='rgba(245,158,11,0.2)'" />
          </div>
        </div>

        <!-- Password -->
        <div style="margin-bottom:24px;">
          <label style="display:block;color:rgba(255,255,255,0.7);font-size:0.88rem;font-weight:600;margin-bottom:8px;">Password</label>
          <div style="position:relative;">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.4);font-size:1.1rem;">🔒</span>
            <input type="password" name="password" id="password" required
              placeholder="Enter password"
              autocomplete="current-password"
              style="width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(245,158,11,0.2);border-radius:10px;padding:13px 42px 13px 42px;color:white;font-family:'Outfit',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.3s;"
              onfocus="this.style.borderColor='rgba(245,158,11,0.6)'"
              onblur="this.style.borderColor='rgba(245,158,11,0.2)'" />
            <button type="button" id="toggle-pass"
              style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:1rem;">
              👁️
            </button>
          </div>
        </div>

        <button type="submit"
          style="width:100%;background:linear-gradient(135deg,#F59E0B,#EA580C);color:white;border:none;border-radius:10px;padding:14px;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;box-shadow:0 6px 20px rgba(245,158,11,0.35);"
          onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 10px 30px rgba(245,158,11,0.5)'"
          onmouseout="this.style.transform='';this.style.boxShadow='0 6px 20px rgba(245,158,11,0.35)'">
          🔐 Sign In
        </button>
      </form>
    </div>

    <!-- Back Link -->
    <div style="text-align:center;margin-top:20px;">
      <a href="/" style="color:rgba(255,255,255,0.4);text-decoration:none;font-size:0.85rem;">
        ← Back to Customer Portal
      </a>
    </div>

    <!-- Default Credentials Hint (DEV - remove in production) -->
    <div style="margin-top:16px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);border-radius:10px;padding:12px;text-align:center;">
      <p style="color:rgba(245,158,11,0.7);font-size:0.78rem;">Default: admin / skegg@2024</p>
    </div>

  </div>

  <div id="toast-container"></div>

  <script>
    // Toggle password visibility
    document.getElementById("toggle-pass").addEventListener("click", () => {
      const pass = document.getElementById("password");
      pass.type = pass.type === "password" ? "text" : "password";
    });

    // Entrance animation
    document.addEventListener("DOMContentLoaded", () => {
      const card = document.getElementById("login-card");
      card.style.opacity = "0";
      card.style.transform = "translateY(30px)";
      setTimeout(() => {
        card.style.transition = "all 0.6s cubic-bezier(0.4,0,0.2,1)";
        card.style.opacity = "1";
        card.style.transform = "translateY(0)";
      }, 100);
    });
  </script>
</body>
</html>
